name: Create episode from queued issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: create-episodes
  cancel-in-progress: false

jobs:
  create-episode:
    if: |
      github.event_name != 'issues' ||
      (github.event.action == 'labeled' && github.event.label.name == 'status: queued')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Select oldest queued issue
        id: pick
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                labels: "status: queued",
                state: "open",
                per_page: 100,
                sort: "created",
                direction: "asc"
              }
            );

            if (!issues.length) {
              core.setOutput("issue_number", "");
              core.info("No queued issues.");
              return;
            }

            const issue = issues[0];
            core.setOutput("issue_number", String(issue.number));
            core.info(`Picked issue #${issue.number}: ${issue.title}`);

      - name: Stop if nothing queued
        if: steps.pick.outputs.issue_number == ''
        run: echo "Queue empty."

      - name: Setup Python
        if: steps.pick.outputs.issue_number != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create episode and approve issue
        if: steps.pick.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/generate_description.py
